{% extends "base.html" %}

{% block content %}

<div class="max-w-4xl mx-auto mt-10">

    <div class="bg-white shadow-xl rounded-xl p-8">

        <h1 class="text-3xl font-bold text-gray-800 mb-2">
            Add Vehicle
        </h1>

        <p class="text-gray-500 mb-8">
            Fill in the details below to add a new vehicle to the inventory.
        </p>

        <form
            id="addVehicleForm"
            class="space-y-6"
            enctype="multipart/form-data"
        >

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                <div>

                    <label class="block mb-2 font-semibold">
                        Make
                    </label>

                    <input
                        id="make"
                        type="text"
                        placeholder="Toyota"
                        class="w-full border rounded-lg p-3 focus:ring-2 focus:ring-green-500 outline-none"
                        required
                    >

                </div>

                <div>

                    <label class="block mb-2 font-semibold">
                        Model
                    </label>

                    <input
                        id="model"
                        type="text"
                        placeholder="Fortuner"
                        class="w-full border rounded-lg p-3 focus:ring-2 focus:ring-green-500 outline-none"
                        required
                    >

                </div>

            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                <div>

                    <label class="block mb-2 font-semibold">
                        Category
                    </label>

                    <select
                        id="category"
                        class="w-full border rounded-lg p-3"
                    >

                        <option>Sedan</option>
                        <option>SUV</option>
                        <option>Hatchback</option>
                        <option>Truck</option>
                        <option>Luxury</option>
                        <option>Sports</option>

                    </select>

                </div>

                <div>

                    <label class="block mb-2 font-semibold">
                        Price
                    </label>

                    <input
                        id="price"
                        type="number"
                        min="1"
                        placeholder="2500000"
                        class="w-full border rounded-lg p-3"
                        required
                    >

                </div>

            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                <div>

                    <label class="block mb-2 font-semibold">
                        Quantity
                    </label>

                    <input
                        id="quantity"
                        type="number"
                        min="0"
                        placeholder="10"
                        class="w-full border rounded-lg p-3"
                        required
                    >

                </div>

                <div>

                    <label class="block mb-2 font-semibold">
                        Vehicle Image
                    </label>

                    <input
                        id="image"
                        type="file"
                        accept="image/*"
                        class="w-full border rounded-lg p-2"
                    >

                </div>

            </div>

            <div class="mt-6">

                <img
                    id="imagePreview"
                    src=""
                    alt="Preview"
                    class="hidden w-full md:w-96 h-60 object-cover rounded-lg border shadow"
                >

            </div>

            <button
                type="submit"
                class="bg-green-600 hover:bg-green-700 transition text-white px-8 py-3 rounded-lg font-semibold"
            >
                Add Vehicle
            </button>

        </form>

    </div>

</div>

<script>

const imageInput = document.getElementById("image");
const preview = document.getElementById("imagePreview");

imageInput.addEventListener("change", function () {

    const file = this.files[0];

    if (!file) {

        preview.classList.add("hidden");
        preview.src = "";
        return;

    }

    const reader = new FileReader();

    reader.onload = function (e) {

        preview.src = e.target.result;
        preview.classList.remove("hidden");

    };

    reader.readAsDataURL(file);

});

</script>

{% endblock %}
