{% extends "base.html" %}

{% block content %}

<div class="max-w-3xl mx-auto mt-10 bg-white shadow rounded p-8">

    <h1 class="text-3xl font-bold mb-8">

        Add Vehicle

    </h1>

    <form id="addVehicleForm" class="space-y-5">

        <input
            id="make"
            type="text"
            placeholder="Make"
            class="w-full border rounded p-3"
            required
        >

        <input
            id="model"
            type="text"
            placeholder="Model"
            class="w-full border rounded p-3"
            required
        >

        <select
            id="category"
            class="w-full border rounded p-3"
        >

            <option>Sedan</option>
            <option>SUV</option>
            <option>Hatchback</option>
            <option>Truck</option>
            <option>Luxury</option>
            <option>Sports</option>

        </select>

        <input
            id="price"
            type="number"
            placeholder="Price"
            class="w-full border rounded p-3"
            required
        >

        <input
            id="quantity"
            type="number"
            placeholder="Quantity"
            class="w-full border rounded p-3"
            required
        >

        <button
            class="bg-green-600 text-white px-6 py-3 rounded">

            Add Vehicle

        </button>

    </form>

</div>

{% endblock %}
