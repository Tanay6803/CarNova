{% extends "base.html" %}

{% block content %}

<div class="max-w-md mx-auto mt-12 bg-white shadow rounded-lg p-8">

    <h2 class="text-3xl font-bold text-center mb-8">
        Register
    </h2>

    <form id="registerForm" class="space-y-5">

        <div>

            <label class="block mb-2">
                Username
            </label>

            <input
                type="text"
                id="reg_username"
                class="w-full border rounded px-4 py-2"
                required
            >

        </div>

        <div>

            <label class="block mb-2">
                Email
            </label>

            <input
                type="email"
                id="reg_email"
                class="w-full border rounded px-4 py-2"
                required
            >

        </div>

        <div>

            <label class="block mb-2">
                Password
            </label>

            <input
                type="password"
                id="reg_password"
                class="w-full border rounded px-4 py-2"
                required
            >

        </div>

        <button
            type="submit"
            class="w-full bg-green-600 text-white rounded py-2 hover:bg-green-700">

            Register

        </button>

    </form>

    <p class="text-center mt-6">

        Already have an account?

        <a
            href="/login/"
            class="text-blue-600">

            Login

        </a>

    </p>

</div>

{% endblock %}
