{% extends "base.html" %}

{% block content %}

<div class="max-w-4xl mx-auto mt-10">

    <div class="bg-white shadow-xl rounded-xl p-8">

        <h1 class="text-3xl font-bold text-gray-800 mb-2">
            Edit Vehicle
        </h1>

        <p class="text-gray-500 mb-8">
            Update the vehicle information and optionally replace its image.
        </p>

        <form
            id="editVehicleForm"
            data-vehicle-id="{{ vehicle.id }}"
            class="space-y-6"
            enctype="multipart/form-data"
        >

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                <div>

                    <label class="block mb-2 font-semibold">
                        Make
                    </label>

                    <input
                        id="make"
                        type="text"
                        value="{{ vehicle.make }}"
                        class="w-full border rounded-lg p-3 focus:ring-2 focus:ring-blue-500 outline-none"
                        required
                    >

                </div>

                <div>

                    <label class="block mb-2 font-semibold">
                        Model
                    </label>

                    <input
                        id="model"
                        type="text"
                        value="{{ vehicle.model }}"
                        class="w-full border rounded-lg p-3 focus:ring-2 focus:ring-blue-500 outline-none"
                        required
                    >

                </div>

            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                <div>

                    <label class="block mb-2 font-semibold">
                        Category
                    </label>

                    <select
                        id="category"
                        class="w-full border rounded-lg p-3"
                    >

                        <option value="Sedan" {% if vehicle.category == "Sedan" %}selected{% endif %}>Sedan</option>
                        <option value="SUV" {% if vehicle.category == "SUV" %}selected{% endif %}>SUV</option>
                        <option value="Hatchback" {% if vehicle.category == "Hatchback" %}selected{% endif %}>Hatchback</option>
                        <option value="Truck" {% if vehicle.category == "Truck" %}selected{% endif %}>Truck</option>
                        <option value="Luxury" {% if vehicle.category == "Luxury" %}selected{% endif %}>Luxury</option>
                        <option value="Sports" {% if vehicle.category == "Sports" %}selected{% endif %}>Sports</option>

                    </select>

                </div>

                <div>

                    <label class="block mb-2 font-semibold">
                        Price
                    </label>

                    <input
                        id="price"
                        type="number"
                        min="1"
                        value="{{ vehicle.price }}"
                        class="w-full border rounded-lg p-3"
                        required
                    >

                </div>

            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                <div>

                    <label class="block mb-2 font-semibold">
                        Quantity
                    </label>

                    <input
                        id="quantity"
                        type="number"
                        min="0"
                        value="{{ vehicle.quantity }}"
                        class="w-full border rounded-lg p-3"
                        required
                    >

                </div>

                <div>

                    <label class="block mb-2 font-semibold">
                        Replace Vehicle Image
                    </label>

                    <input
                        id="image"
                        type="file"
                        accept="image/*"
                        class="w-full border rounded-lg p-2"
                    >

                </div>

            </div>

            <div class="mt-6">

                {% if vehicle.image %}

                <img
                    id="imagePreview"
                    src="{{ vehicle.image.url }}"
                    alt="{{ vehicle.make }}"
                    class="w-full md:w-96 h-60 object-cover rounded-lg border shadow"
                >

                {% else %}

                <img
                    id="imagePreview"
                    src="https://placehold.co/600x400?text=No+Image"
                    alt="No Image"
                    class="w-full md:w-96 h-60 object-cover rounded-lg border shadow"
                >

                {% endif %}

            </div>

            <button
                type="submit"
                class="bg-blue-600 hover:bg-blue-700 transition text-white px-8 py-3 rounded-lg font-semibold"
            >
                Update Vehicle
            </button>

        </form>

    </div>

</div>

<script>

const imageInput = document.getElementById("image");
const preview = document.getElementById("imagePreview");

imageInput.addEventListener("change", function () {

    const file = this.files[0];

    if (!file) return;

    const reader = new FileReader();

    reader.onload = function (e) {

        preview.src = e.target.result;

    };

    reader.readAsDataURL(file);

});

</script>

{% endblock %}
