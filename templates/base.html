{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CarNova | Smart Vehicle Management</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

</head>

<body class="min-h-screen bg-slate-100">

<nav class="sticky top-0 z-50 bg-white/90 backdrop-blur-lg border-b border-slate-200 shadow-sm">

    <div class="max-w-7xl mx-auto px-6">

        <div class="h-16 flex items-center justify-between">

            <a href="/"
               class="flex items-center gap-3">

                <div class="w-10 h-10 rounded-xl bg-indigo-600 text-white flex items-center justify-center font-bold text-lg shadow">

                    C

                </div>

                <div>

                    <h1 class="text-2xl font-extrabold text-slate-800 tracking-tight">

                        CarNova

                    </h1>

                    <p class="text-xs text-slate-500 -mt-1">

                        Drive Smarter. Manage Better.

                    </p>

                </div>

            </a>

            <div id="guestNav"
                 class="flex items-center gap-8 text-sm font-medium text-slate-700">

                <a href="/"
                   class="nav-link">

                    Home

                </a>

                <a href="/login/"
                   class="nav-link">

                    Login

                </a>

                <a href="/register/"
                   class="btn-primary">

                    Register

                </a>

            </div>

            <div id="userNav"
                 class="hidden flex items-center gap-8 text-sm font-medium text-slate-700">

                <a href="/"
                   class="nav-link">

                    Home

                </a>

                <a href="/dashboard/"
                   class="nav-link">

                    Dashboard

                </a>

                <button id="logoutBtn"
                        class="btn-danger">

                    Logout

                </button>

            </div>

        </div>

    </div>

</nav>

<main class="max-w-7xl mx-auto px-6 py-10">

    {% block content %}
    {% endblock %}

</main>

<footer class="mt-16 border-t border-slate-200 bg-white">

    <div class="max-w-7xl mx-auto px-6 py-10 flex flex-col md:flex-row justify-between items-center gap-4">

        <div>

            <h2 class="font-bold text-slate-800 text-lg">

                CarNova

            </h2>

            <p class="text-sm text-slate-500">

                Smart Vehicle Inventory & Sales Management System
            </p>

        </div>

        <div class="text-sm text-slate-500">

            © 2026 CarNova. Built using Django & Tailwind CSS.

        </div>

    </div>

</footer>

<script src="{% static 'js/auth.js' %}"></script>
<script src="{% static 'js/vehicle.js' %}"></script>
<script src="{% static 'js/inventory.js' %}"></script>

<script>

document.addEventListener("DOMContentLoaded", () => {

    const guestNav = document.getElementById("guestNav");
    const userNav = document.getElementById("userNav");

    if (localStorage.getItem("access")) {

        guestNav.classList.add("hidden");
        userNav.classList.remove("hidden");

    }

});

</script>

</body>

</html>
